<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Creative coding workspace</title>
  <desc id="desc">A stylized desk with a laptop, notebook, plant, and daylight from a window.</desc>
  <defs>
